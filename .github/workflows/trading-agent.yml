name: Trading Signal Agent

on:
  workflow_dispatch:
    inputs:
      reason:
        description: 'Reason for run (from external cron)'
        required: false
        default: 'Scheduled by external cron'

jobs:
  run-trading-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Trading Signal Agent
        run: python trading_agent.py     # ← CHANGE this if your script has a different name
