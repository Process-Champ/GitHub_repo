name: Trading Signal Agent

on:
  workflow_dispatch:           # ← This allows external cron to trigger it
    inputs:
      reason:
        description: 'Reason for run (from external cron)'
        required: false
        default: 'Scheduled by external cron'

jobs:
  run-trading-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'     # Change if your script needs 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Trading Signal Agent
        run: python trading_agent.py          # ← CHANGE this to your actual Python file name
        env:
          # Add your secret keys here (recommended)
          # API_KEY: ${{ secrets.API_KEY }}
          # TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          # etc.
